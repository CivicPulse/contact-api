apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-api
  namespace: civpulse-dev
  labels:
    app: contact-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contact-api
  template:
    metadata:
      labels:
        app: contact-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/CivicPulse/contact-api:sha-1d53b5e
          imagePullPolicy: Always
          command: ["uv", "run", "python", "main.py", "db", "upgrade"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: contact-api-secret
                  key: DATABASE_URL
      containers:
        - name: contact-api
          image: ghcr.io/CivicPulse/contact-api:sha-1d53b5e
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: contact-api-secret
                  key: DATABASE_URL
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
